services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena_dev
      POSTGRES_DB: arena_db
    ports: ["5432:5432"]
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d arena_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: redis-server --appendonly yes
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: { context: ., dockerfile: docker/Dockerfile.api }
    environment:
      DATABASE_URL: postgresql://arena:arena_dev@postgres:5432/arena_db
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev_super_secret_change_me_in_production_please
      NODE_ENV: production
      API_PORT: "3001"
      CORS_ORIGIN: http://localhost:3000
      FOOTBALL_NEWS_FEEDS: ${FOOTBALL_NEWS_FEEDS:-https://feeds.bbci.co.uk/sport/football/rss.xml,https://www.theguardian.com/football/rss,https://www.espn.com/espn/rss/soccer/news}
      FOOTBALL_NEWS_CACHE_TTL_MS: ${FOOTBALL_NEWS_CACHE_TTL_MS:-300000}
      FOOTBALL_NEWS_TIMEOUT_MS: ${FOOTBALL_NEWS_TIMEOUT_MS:-4500}
    ports: ["3001:3001"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  txline-consumer:
    build: { context: ., dockerfile: docker/Dockerfile.txline-consumer }
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://arena:arena_dev@postgres:5432/arena_db
      TXLINE_API_HOST: https://txline.txodds.com
      TXLINE_BASE_URL: ${TXLINE_BASE_URL:-http://localhost:4000/stream}
      TXLINE_GUEST_JWT: ${TXLINE_GUEST_JWT:-}
      TXLINE_API_TOKEN: ${TXLINE_API_TOKEN:-}
    ports: ["4001:4001"]
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }

  agent-runtime:
    build: { context: ., dockerfile: docker/Dockerfile.agent-runtime }
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://arena:arena_dev@postgres:5432/arena_db
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ENABLE_LLM: ${ENABLE_LLM:-false}
    ports: ["3002:3002"]
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }

  event-worker:
    build: { context: ., dockerfile: docker/Dockerfile.event-worker }
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://arena:arena_dev@postgres:5432/arena_db
    ports: ["3003:3003"]
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }

  web:
    build: { context: ., dockerfile: docker/Dockerfile.web }
    ports: ["3000:3000"]
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:3001/ws

volumes:
  postgres_data:
  redis_data:

